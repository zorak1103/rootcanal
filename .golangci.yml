# generated by go-github-pipelines v1.3.0

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Correctness
    - errcheck          # unchecked errors
    - govet             # vet checks (includes shadow)
    - staticcheck       # staticanalysis (SA, S, QF)
    - ineffassign       # ineffectual assignments
    - unused            # unused code

    # Security
    - gosec             # security issues (G001-G601)

    # Code quality
    - gocritic          # diagnostics and style suggestions
    - revive            # opinionated linter (replaces golint)
    - goconst           # repeated string literals
    - misspell          # spelling mistakes

    # Complexity (onboarding thresholds — see settings below)
    - funlen            # function length
    - gocognit          # cognitive complexity
    - gocyclo           # cyclomatic complexity

    # Error handling
    - errorlint         # error wrapping issues

    # Miscellaneous
    - exhaustive        # missing enum cases in switch
    - nilerr            # nil returned when error is non-nil
    - unparam           # unused function parameters
    - prealloc          # slice preallocation opportunities

  settings:
    govet:
      enable:
        - shadow           # variable shadowing

    errcheck:
      exclude-functions:
        # CLI / logging patterns where ignoring errors is idiomatic
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (io.Closer).Close

    funlen:
      lines: 80            # onboarding
      statements: 50       # onboarding

    gocognit:
      min-complexity: 30   # onboarding

    gocyclo:
      min-complexity: 20   # onboarding

    goconst:
      min-occurrences: 5   # default 3 is too noisy for test fixtures

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck

    gosec:
      excludes:
        - G104  # Errors unhandled (covered by errcheck)
        - G304  # File path provided as taint input (often intentional)

  exclusions:
    rules:
      # Test files: relax rules that hurt test readability
      - path: "_test\\.go$"
        linters:
          - errcheck
          - gosec
          - gocritic
          - funlen
          - gocognit
          - govet
          - goconst
    paths:
      # Generated code: exclude from all linters
      - "(_gen|_generated)\\.go$"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  # Maximum issues per linter (0 = unlimited)
  max-issues-per-linter: 0
  max-same-issues: 0
