stages:
  - verify
  - test
  - build
  - release

variables:
  GOMODCACHE: "$CI_PROJECT_DIR/.go/pkg/mod"
  GOPATH: "$CI_PROJECT_DIR/.go"
  GO_VERSION: "1.26"

default:
  image: golang:${GO_VERSION}
  before_script:
    - export PATH="${GOPATH}/bin:${PATH}"
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod/

lint:
  stage: verify
  script:
    - go vet ./...
    - go install honnef.co/go/tools/cmd/staticcheck@latest
    - staticcheck ./...

test:
  stage: test
  script:
    - go test ./... -count=1

cover:
  stage: test
  script:
    - go test ./... -coverprofile=coverage.out -coverpkg=./internal/...
    - go tool cover -func=coverage.out
    - |
      pct=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$NF); print $NF}')
      echo "Coverage: ${pct}%  (min 85.0%)"
      awk -v p="${pct}" 'BEGIN{if(p+0<85.0){print "FAIL: coverage below 85%"; exit 1}}'
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'

build:
  stage: build
  script:
    - go build ./cmd/rootcanal
  artifacts:
    paths:
      - rootcanal
    expire_in: 1 week

release:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: ['']
  variables:
    GIT_DEPTH: 0
    GOTOOLCHAIN: auto
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script: []
  script:
    - goreleaser release --clean
  artifacts:
    paths:
      - dist/
    expire_in: 4 weeks

# macOS and Windows runners: add parallel jobs here once runners are configured.
# build:macos:
#   tags: [macos-saas-m2]
#   ...
# build:windows:
#   tags: [windows]
#   ...
