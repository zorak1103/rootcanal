stages:
  - maintenance
  - verify
  - test
  - build
  - release

variables:
  GOMODCACHE: "$CI_PROJECT_DIR/.go/pkg/mod"
  GOPATH: "$CI_PROJECT_DIR/.go"
  GO_VERSION: "1.26"

default:
  image: golang:${GO_VERSION}
  tags: [private]
  before_script:
    - export PATH="${GOPATH}/bin:${PATH}"
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod/

lint:
  stage: verify
  script:
    - test -z "$(gofmt -s -l $(git ls-files '*.go'))" || (gofmt -s -l $(git ls-files '*.go') && exit 1)

test:
  stage: test
  tags: [aorus]
  variables:
    GOMAXPROCS: "2"
    GOFLAGS: "-p=2"
  # Coverage and static analysis are enforced locally by the pre-push hook
  # (go vet + staticcheck) and `task cover` (≥85% gate). CI verifies only that
  # tests pass — the heavy -coverpkg=./internal/... flag is omitted to stay
  # within runner memory limits.
  script:
    - go test -count=1 -parallel 2 ./...

build:
  stage: build
  script:
    - go build ./cmd/rootcanal
  artifacts:
    paths:
      - rootcanal
    expire_in: 1 week

release:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: ['']
  variables:
    GIT_DEPTH: 0
    GOTOOLCHAIN: auto
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script: []
  script:
    - goreleaser release --clean
  artifacts:
    paths:
      - dist/
    expire_in: 4 weeks

renovate:
  stage: maintenance
  image:
    name: renovate/renovate:43
    entrypoint: [""]
  variables:
    LOG_LEVEL: info
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: "https://gitlab.com/api/v4/"
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: "zorak1103/rootcanal"
  before_script: []
  cache: {}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_DRY_RUN == null'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_DRY_RUN == "true"'
      variables:
        LOG_LEVEL: debug
  script:
    - renovate

# macOS and Windows runners: add parallel jobs here once runners are configured.
# build:macos:
#   tags: [macos-saas-m2]
#   ...
# build:windows:
#   tags: [windows]
#   ...
