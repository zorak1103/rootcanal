stages:
  - maintenance
  - verify
  - test
  - build
  - release

variables:
  GOFLAGS: "-mod=vendor"
  GO_VERSION: "1.26"

default:
  image: golang:${GO_VERSION}
  tags: [private]
  before_script: []
  cache: {}

lint:
  stage: verify
  script:
    - FILES=$(git ls-files '*.go' | grep -v '^vendor/')
    - test -z "$(gofmt -s -l $FILES)" || (gofmt -s -l $FILES && exit 1)

test:
  stage: test
  # go vet and staticcheck are enforced by the pre-push hook locally.
  # CI runs only go test + coverage to stay within runner memory limits.
  script:
    - go test ./... -count=1 -coverprofile=coverage.out -coverpkg=./internal/...
    - go tool cover -func=coverage.out
    - |
      pct=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$NF); print $NF}')
      echo "Coverage: ${pct}%  (min 79.0%)"
      awk -v p="${pct}" 'BEGIN{if(p+0<79.0){print "FAIL: coverage below 79%"; exit 1}}'
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'

build:
  stage: build
  script:
    - go build ./cmd/rootcanal
  artifacts:
    paths:
      - rootcanal
    expire_in: 1 week

release:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: ['']
  variables:
    GIT_DEPTH: 0
    GOTOOLCHAIN: auto
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script: []
  script:
    - goreleaser release --clean
  artifacts:
    paths:
      - dist/
    expire_in: 4 weeks

renovate:
  stage: maintenance
  image:
    name: renovate/renovate:43
    entrypoint: [""]
  variables:
    LOG_LEVEL: info
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: "https://gitlab.com/api/v4/"
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: "zorak1103/rootcanal"
  before_script: []
  cache: {}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_DRY_RUN == null'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_DRY_RUN == "true"'
      variables:
        LOG_LEVEL: debug
  script:
    - renovate

# macOS and Windows runners: add parallel jobs here once runners are configured.
# build:macos:
#   tags: [macos-saas-m2]
#   ...
# build:windows:
#   tags: [windows]
#   ...
