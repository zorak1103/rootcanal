version: '3'

vars:
  MODULE: github.com/zorak1103/rootcanal
  MIN_COVERAGE: "85.0"
  VERSION:
    sh: git describe --tags --always 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
  DATE: '{{ dateInZone "2006-01-02T15:04:05Z" now "UTC" }}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the rootcanal binary (output named per platform)
    cmds:
      - >-
        go build
        -ldflags="-X {{.MODULE}}/internal/version.Version={{.VERSION}}
        -X {{.MODULE}}/internal/version.Commit={{.COMMIT}}
        -X {{.MODULE}}/internal/version.Date={{.DATE}}"
        ./cmd/rootcanal

  test:
    desc: Run tests (use CGO_ENABLED=1 task test for race detection on Windows)
    cmds:
      - go test ./... -count=1

  cover:
    desc: Run tests and enforce ≥{{.MIN_COVERAGE}}% line coverage
    cmds:
      - go test ./... -coverprofile=coverage.out -coverpkg=./internal/...
      - go tool cover -func=coverage.out
      - go run ./tools/covercheck -min={{.MIN_COVERAGE}} coverage.out

  lint:
    desc: Run golangci-lint (CI installs it; locally run `task lint:install` first)
    cmds:
      - golangci-lint run --timeout=5m ./...

  lint:install:
    desc: Install golangci-lint locally (tracked by Renovate)
    cmds:
      # renovate: datasource=go depName=github.com/golangci/golangci-lint/v2
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  snapshot:
    desc: Build cross-platform release archives locally without publishing (requires goreleaser)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Publish a release to GitHub (run on a tagged commit; requires goreleaser + GITHUB_TOKEN)
    cmds:
      - goreleaser release --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - cmd: rm -f rootcanal rootcanal.exe coverage.out coverage.xml
        platforms: [linux, darwin]
      - cmd: rm -rf dist/
        platforms: [linux, darwin]
      - cmd: cmd /c "del /q /f rootcanal.exe coverage.out coverage.xml 2>nul & if exist dist rmdir /s /q dist & exit 0"
        platforms: [windows]

  e2e:
    desc: Run end-to-end tests against a real SSH container (requires Docker)
    cmds:
      - go test -tags=e2e -count=1 -timeout=8m ./e2e/... -v

  setup:
    desc: Activate committed git hooks (run once after cloning)
    cmds:
      - git config core.hooksPath .githooks
      - chmod +x .githooks/pre-commit .githooks/pre-push
      - echo "Git hooks activated (pre-commit auto-fixes gofmt; pre-push runs golangci-lint). Bypass either with --no-verify."

  fmt:
    desc: Format all Go files (gofmt -s -w)
    cmds:
      - gofmt -s -w .

  run:
    desc: Run rootcanal (pass args after --, e.g. task run -- -config rootcanal.yaml)
    cmds:
      - go run ./cmd/rootcanal {{.CLI_ARGS}}
